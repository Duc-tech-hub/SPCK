<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="../css/pay-form.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <a class="btn btn-secondary" href="cart.html">
        <i class="bi bi-chevron-left"></i>
    </a>
    <form id="pay-form">
        <h1>Payment</h1>
        <label class="label" for="name">Candidate name:</label><br>
        <input class="input" type="text" required placeholder="Your candidate name..."><br>
        <label class="label" for="age">Age:</label><br>
        <input class="input" type="text" required placeholder="Your age..."><br>
        <label class="label" for="pass">Your password:</label><br>
        <input class="input" type="password" required placeholder="Your account password..."><br>
        <span id="output_money">Total:</span><br>
        <button id="redirect">Pay</button>
    </form>
    <script type="module" src="../js/cart.js"></script>
</body>

</html>
